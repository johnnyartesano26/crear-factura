name: Emitir Facturas

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  emitir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Emitir facturas (Remisiones + Inventario → Alegra)
        id: emitir
        env:
          ALEGRA_EMAIL: ${{ secrets.ALEGRA_EMAIL }}
          ALEGRA_TOKEN: ${{ secrets.ALEGRA_TOKEN }}
        run: python emitir.py

      - name: Guardar registro de emitidas (evita duplicados)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add emitidas.json
          if git diff --cached --quiet; then
            echo "Sin nuevas facturas que registrar."
          else
            git commit -m "Facturas emitidas $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi

      - name: Aviso por Telegram
        if: always()
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESUMEN: ${{ steps.emitir.outputs.resumen }}
        run: |
          if [ -n "$TG" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TG/sendMessage" \
              --data-urlencode chat_id="$CID" \
              --data-urlencode parse_mode="HTML" \
              --data-urlencode text="🧾 <b>Emisión de facturas — Madre Monte</b>
${RESUMEN:-Proceso ejecutado (ver logs).}
🔗 https://app.alegra.com" > /dev/null || true
          fi
