name: Emitir Facturas

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emitir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install google-auth google-api-python-client

      - name: Emitir facturas (Remisiones + Inventario -> Alegra + descuento de stock)
        id: emitir
        env:
          ALEGRA_EMAIL: ${{ secrets.ALEGRA_EMAIL }}
          ALEGRA_TOKEN: ${{ secrets.ALEGRA_TOKEN }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python emitir.py

      - name: Aviso por Telegram
        if: always()
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESUMEN: ${{ steps.emitir.outputs.resumen }}
        run: |
          if [ -n "$TG" ]; then
            MSG=$(printf '🧾 <b>Emisión de facturas — Madre Monte</b>\n%s\n📦 Inventario descontado automáticamente.\n🔗 https://app.alegra.com' "${RESUMEN:-Proceso ejecutado (ver logs).}")
            curl -s -X POST "https://api.telegram.org/bot$TG/sendMessage" \
              --data-urlencode chat_id="$CID" \
              --data-urlencode parse_mode="HTML" \
              --data-urlencode text="$MSG" > /dev/null || true
          fi
